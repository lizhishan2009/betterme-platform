<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetterMe 内容平台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F3F4F6;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
        }
        h1 { font-size: 32px; margin-bottom: 24px; color: #1F2937; }
        p { margin-bottom: 16px; line-height: 1.8; }
        .test-box {
            margin-top: 40px;
            padding: 20px;
            background: #E8F5E9;
            border-radius: 8px;
        }
        .test-box h3 { margin-bottom: 12px; }
        .test-box ul { margin-top: 10px; padding-left: 20px; }
        .test-box li { margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>欢迎来到 BetterMe 内容平台</h1>
        <p>这是一个基于 Notion 构建的会员内容平台。</p>
        
        <div class="test-box">
            <h3>🧪 测试内容</h3>
            <p>这是一个测试页面，用于验证BetterMe Platform是否正常运行。</p>
            <ul>
                <li>✅ Vercel部署成功</li>
                <li>✅ 域名解析正常</li>
                <li>✅ Next.js应用运行中</li>
            </ul>
        </div>
    </div>
</body>
</html>
